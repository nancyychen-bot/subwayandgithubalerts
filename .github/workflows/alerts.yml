name: MTA Subway Alerts

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  check-alerts:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Restore alert state
        uses: actions/cache@v4
        with:
          path: state.json
          key: state-${{ github.run_id }}
          restore-keys: state-

      - name: Check MTA alerts
        env:
          NTFY_TOPIC: ${{ secrets.NTFY_TOPIC }}
        run: python subway_alerts.py
